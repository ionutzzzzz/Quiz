<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1 class="quiz-title">Java Quiz</h1>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div id="score">Score: 0</div>
        </div> 
        <div id="question-container" class="hide">
            <div id="question">Question</div>
            <div id="answer-buttons" class="btn-grid">
                <button class="btn">Answer 1</button>
                <button class="btn">Answer 2</button>
                <button class="btn">Answer 3</button>
                <button class="btn">Answer 4</button>
            </div>
        </div>
        <div id="results-container" class="hide">
            <h2 id="results-title">Quiz Finished!</h2>
            <p id="results-score"></p>
            <p id="results-mark"></p>
            <button id="restart-btn" class="btn">Restart</button>
            <div id="detailed-results" class="hide">
                <div id="results-summary"></div>
                <div id="questions-list"></div>
            </div>
            <button id="previous-scores-btn" class="btn">Previous Scores</button>
            <div id="previous-scores-container" class="hide">
                <h3>Previous Scores</h3>
                <div id="scores-list"></div>
            </div>
        </div>
        <div class="controls">
            <button id="start-btn" class="start-btn btn">Start</button>
            <button id="submit-btn" class="submit-btn btn hide">Submit</button>
            <button id="next-btn" class="next-btn btn hide">Next</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
